name: Product CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make sync
      - run: make lint
      - run: make contract-test
      - run: uv run pytest tests/Unit tests/Integration